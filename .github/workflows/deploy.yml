name: Deploy Angular App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22

          script: |
            set -e

            APP_DIR="/home/${{ secrets.VPS_USERNAME }}/test-ci-cd"
            REPO_URL="https://github.com/IrwanZamroni/test-ci-cd.git"

            echo "===== PREPARE PROJECT ====="

            # 🔥 FIX: ensure valid git repo
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Cleaning old/broken folder..."
              rm -rf $APP_DIR

              echo "Cloning fresh repo..."
              git clone $REPO_URL $APP_DIR
            fi

            echo "===== ENTER REPO ====="
            cd $APP_DIR

            echo "===== PULL LATEST CODE ====="
            git fetch origin
            git reset --hard origin/main

            echo "===== ENTER ANGULAR PROJECT ====="
            cd angular-tour-of-heroes

            echo "===== INSTALL DEPENDENCIES ====="
            npm install

            echo "===== BUILD ANGULAR ====="
            npm run build -- --configuration production

            echo "===== ENSURE SERVE INSTALLED ====="
            npm list -g serve || npm install -g serve

            echo "===== RESTART PM2 ====="
            pm2 delete angular-app || true
            pm2 start serve --name angular-app -- -s dist/angular-tour-of-heroes -l 3000

            pm2 save

            echo "===== DEPLOY SUCCESS ====="